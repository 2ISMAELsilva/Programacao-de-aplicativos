<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Calculadora de Média</h2>
        
        <div class="input-group">
            <label for="n1">Nota 1:</label>
            <input type="number" id="n1" min="0" max="10" step="0.1" placeholder="Ex: 8.5">
        </div>
        
        <div class="input-group">
            <label for="n2">Nota 2:</label>
            <input type="number" id="n2" min="0" max="10" step="0.1" placeholder="Ex: 6.0">
        </div>
        
        <div class="input-group">
            <label for="n3">Nota 3:</label>
            <input type="number" id="n3" min="0" max="10" step="0.1" placeholder="Ex: 9.2">
        </div>

        <button onclick="calcular()">Calcular Média</button>

        <div class="resultado-box">
            <p id="media">Aguardando notas...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
